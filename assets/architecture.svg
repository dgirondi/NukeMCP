<svg width="480" height="300" viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d1d5db"/>
    </marker>
  </defs>


  <!-- Box 1: LLM client -->
  <rect x="60" y="20" width="360" height="64" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="240" y="47" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">LLM client</text>
  <text x="240" y="68" text-anchor="middle" font-size="12" fill="#6b7280">Claude Code · Claude Desktop · any MCP client</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="84" x2="240" y2="114" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="128" y="92" width="224" height="16" rx="3" fill="#f9fafb"/>
  <text x="240" y="105" text-anchor="middle" font-size="11" fill="#9ca3af">MCP over stdio (JSON-RPC)</text>

  <!-- Box 2: server/ -->
  <rect x="60" y="118" width="360" height="64" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="240" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">server/</text>
  <text x="240" y="166" text-anchor="middle" font-size="12" fill="#6b7280">standalone MCP process · any Python env</text>

  <!-- Arrow 2 -->
  <line x1="240" y1="182" x2="240" y2="212" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="116" y="190" width="248" height="16" rx="3" fill="#f9fafb"/>
  <text x="240" y="203" text-anchor="middle" font-size="11" fill="#9ca3af">NDJSON over TCP · 127.0.0.1:9787</text>

  <!-- Box 3: nuke_addon/ — Nuke yellow -->
  <rect x="60" y="216" width="360" height="64" rx="8" fill="#fffdf5" stroke="#FDBF32" stroke-width="2"/>
  <text x="240" y="243" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">nuke_addon/</text>
  <text x="240" y="264" text-anchor="middle" font-size="12" fill="#6b7280">inside Nuke 17's own process</text>
</svg>
